<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PuppyPocket — กระเป๋าครอบครัว</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --purple-deep:#2d1b4e;--purple-main:#6c3fa0;--purple-mid:#8b5fcf;
      --purple-light:#b794f6;--purple-pale:#e9d5ff;--bg:#1a0f2e;
      --bg-card:rgba(255,255,255,0.07);--bg-card-h:rgba(255,255,255,0.12);
      --fg:#f3f0ff;--fg-m:#b8ace0;--pink:#f472b6;--yellow:#fbbf24;
      --green:#34d399;--red:#f87171;--border:rgba(255,255,255,0.08);
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{background:#0a0612;color:var(--fg);font-family:'Prompt','Nunito',sans-serif;
      min-height:100vh;display:flex;justify-content:center;overflow:hidden}
    .phone{width:100%;max-width:420px;height:100vh;position:relative;overflow:hidden;
      background:linear-gradient(170deg,#2d1b4e 0%,#1a0f2e 40%,#120a20 100%)}
    @media(min-width:500px){
      body{padding:1.5rem 0;align-items:center}
      .phone{height:min(900px,95vh);border-radius:36px;
        border:3px solid rgba(139,95,207,0.3);
        box-shadow:0 0 80px rgba(139,95,207,0.15)}
    }
    .glow{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
    .g1{width:300px;height:300px;background:rgba(139,95,207,0.25);top:-60px;right:-80px;animation:gp 6s ease-in-out infinite}
    .g2{width:200px;height:200px;background:rgba(244,114,182,0.15);bottom:200px;left:-60px;animation:gp 8s ease-in-out infinite reverse}
    @keyframes gp{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.15)}}

    /* หน้าจอ */
    .screen{position:absolute;inset:0;z-index:1;display:none;flex-direction:column;
      overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
    .screen::-webkit-scrollbar{display:none}
    .screen.active{display:flex}
    .screen-fade-in{animation:sfi .35s ease}
    @keyframes sfi{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

    /* หน้าต้อนรับ */
    .welcome{justify-content:center;align-items:center;padding:2rem;text-align:center}
    .welcome-puppy{width:160px;height:160px;margin-bottom:1.5rem;animation:pb 3s ease-in-out infinite}
    @keyframes pb{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    .welcome h1{font-family:'Nunito',sans-serif;font-size:2rem;font-weight:900;
      background:linear-gradient(135deg,var(--purple-light),var(--pink));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.3rem}
    .welcome .sub{color:var(--fg-m);font-size:.85rem;margin-bottom:2rem}
    .w-form{width:100%;max-width:300px;display:flex;flex-direction:column;gap:12px}
    .w-input{width:100%;padding:14px 16px;background:var(--bg-card);border:1px solid var(--border);
      border-radius:14px;color:var(--fg);font-family:inherit;font-size:.9rem;outline:none;
      transition:border-color .2s}
    .w-input:focus{border-color:var(--purple-mid);box-shadow:0 0 0 3px rgba(139,95,207,.15)}
    .w-input::placeholder{color:rgba(184,172,224,.4)}
    .w-btn{width:100%;padding:14px;border:none;border-radius:14px;
      background:linear-gradient(135deg,var(--purple-mid),var(--pink));color:white;
      font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer;
      transition:all .25s;margin-top:.5rem}
    .w-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(139,95,207,.3)}
    .w-btn:active{transform:scale(.98)}
    .w-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
    .w-label{text-align:left;font-size:.75rem;color:var(--fg-m);font-weight:500;margin-bottom:-6px}

    /* หน้าเลือกสมาชิก */
    .login{justify-content:center;align-items:center;padding:2rem;text-align:center}
    .login .family-name{font-size:.8rem;color:var(--purple-light);font-weight:600;
      letter-spacing:.08em;text-transform:uppercase;margin-bottom:1.5rem}
    .login h2{font-family:'Nunito',sans-serif;font-size:1.6rem;font-weight:800;margin-bottom:2rem}
    .member-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;width:100%;max-width:320px;margin-bottom:2rem}
    .member-card{background:var(--bg-card);border:1px solid var(--border);border-radius:18px;
      padding:20px 12px;cursor:pointer;transition:all .25s;display:flex;flex-direction:column;
      align-items:center;gap:10px}
    .member-card:hover{background:var(--bg-card-h);transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.2)}
    .member-card:active{transform:scale(.97)}
    .mc-avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;
      justify-content:center;font-size:1.3rem;font-weight:800;color:white;font-family:'Nunito',sans-serif}
    .mc-name{font-size:.85rem;font-weight:600}
    .mc-role{font-size:.65rem;color:var(--fg-m)}
    .add-member-card{border:2px dashed rgba(139,95,207,.3);background:transparent}
    .add-member-card:hover{border-color:var(--purple-mid);background:rgba(139,95,207,.05)}
    .add-member-card .mc-avatar{background:rgba(139,95,207,.15);color:var(--purple-light);font-size:1.5rem}

    /* หน้าหลัก */
    .main-screen{padding:0 0 90px}
    .top-nav{display:flex;justify-content:space-between;align-items:center;padding:16px 20px 12px}
    .nav-brand{display:flex;align-items:center;gap:8px}
    .nav-brand-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--purple-mid),var(--pink));
      border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:white}
    .nav-brand-text{font-family:'Nunito',sans-serif;font-weight:900;font-size:1.15rem;
      background:linear-gradient(135deg,var(--purple-light),var(--pink));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .nav-user{display:flex;align-items:center;gap:10px;cursor:pointer}
    .nav-user-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;
      justify-content:center;font-size:.8rem;font-weight:800;color:white;font-family:'Nunito',sans-serif}
    .nav-user-name{font-size:.8rem;font-weight:600;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

    .puppy-small{display:flex;justify-content:center;padding:8px 0 0}
    .puppy-small svg{width:90px;height:90px;animation:pb 3s ease-in-out infinite}

    .wallet-card{margin:-10px 20px 0;background:linear-gradient(135deg,var(--purple-main),#8b5fcf 40%,#a855f7 70%,var(--pink));
      border-radius:24px;padding:22px;position:relative;overflow:hidden;box-shadow:0 16px 48px rgba(139,95,207,.3)}
    .wallet-card::before{content:'';position:absolute;top:-30%;right:-20%;width:200px;height:200px;background:rgba(255,255,255,.08);border-radius:50%}
    .wallet-card::after{content:'';position:absolute;bottom:-40%;left:-10%;width:160px;height:160px;background:rgba(255,255,255,.05);border-radius:50%}
    .wc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;position:relative;z-index:1}
    .wc-label{font-size:.72rem;color:rgba(255,255,255,.7);font-weight:500}
    .wc-level{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.15);
      backdrop-filter:blur(8px);padding:4px 12px;border-radius:999px;font-size:.68rem;font-weight:600;color:var(--yellow)}
    .wc-balance{position:relative;z-index:1;margin-bottom:16px}
    .wc-balance .amount{font-family:'Nunito',sans-serif;font-size:2.6rem;font-weight:900;color:white;
      line-height:1;text-shadow:0 2px 12px rgba(0,0,0,.2)}
    .wc-balance .cur{font-size:1.1rem;font-weight:600;opacity:.8;margin-right:2px}
    .wc-balance .sub{font-size:.68rem;color:rgba(255,255,255,.5);margin-top:4px}
    .wc-actions{display:flex;gap:10px;position:relative;z-index:1}
    .wc-btn{flex:1;padding:10px 0;border:none;border-radius:14px;font-family:inherit;
      font-size:.8rem;font-weight:600;cursor:pointer;display:flex;align-items:center;
      justify-content:center;gap:6px;transition:all .25s}
    .wc-btn.pri{background:white;color:var(--purple-main)}
    .wc-btn.pri:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.15)}
    .wc-btn.sec{background:rgba(255,255,255,.15);color:white;backdrop-filter:blur(4px)}
    .wc-btn.sec:hover{background:rgba(255,255,255,.25)}

    .quick-menu{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:18px 20px}
    .qi{display:flex;flex-direction:column;align-items:center;gap:8px;padding:14px 4px;
      border-radius:16px;background:var(--bg-card);border:1px solid var(--border);cursor:pointer;transition:all .25s}
    .qi:hover,.qi:active{background:var(--bg-card-h);transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.2)}
    .qi-icon{width:42px;height:42px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
    .qi-icon.q1{background:rgba(139,95,207,.15);color:var(--purple-light)}
    .qi-icon.q2{background:rgba(52,211,153,.15);color:var(--green)}
    .qi-icon.q3{background:rgba(244,114,182,.15);color:var(--pink)}
    .qi-icon.q4{background:rgba(251,191,36,.15);color:var(--yellow)}
    .qi-label{font-size:.66rem;color:var(--fg-m);font-weight:500}

    .sec-hdr{display:flex;justify-content:space-between;align-items:center;padding:0 20px;margin-bottom:10px}
    .sec-title{font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800}
    .sec-link{font-size:.72rem;color:var(--purple-light);text-decoration:none;font-weight:600;cursor:pointer}
    .sec-link:hover{color:var(--pink)}

    .tx-list{padding:0 20px;display:flex;flex-direction:column;gap:8px}
    .tx-item{display:flex;align-items:center;gap:14px;padding:13px;background:var(--bg-card);
      border:1px solid var(--border);border-radius:16px;cursor:pointer;transition:all .25s}
    .tx-item:hover{background:var(--bg-card-h);transform:translateX(4px)}
    .tx-ic{width:42px;height:42px;border-radius:14px;display:flex;align-items:center;
      justify-content:center;font-size:.95rem;flex-shrink:0}
    .tx-ic.exp{background:rgba(248,113,113,.12);color:var(--red)}
    .tx-ic.inc{background:rgba(52,211,153,.12);color:var(--green)}
    .tx-ic.trn{background:rgba(139,95,207,.12);color:var(--purple-light)}
    .tx-info{flex:1;min-width:0}
    .tx-name{font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tx-time{font-size:.65rem;color:var(--fg-m);margin-top:2px}
    .tx-amt{text-align:right;flex-shrink:0}
    .tx-amt .v{font-family:'Nunito',sans-serif;font-size:.88rem;font-weight:800}
    .tx-amt .v.neg{color:var(--red)}.tx-amt .v.pos{color:var(--green)}
    .tx-amt .st{font-size:.6rem;color:var(--fg-m);margin-top:2px}

    .empty-state{padding:3rem 20px;text-align:center;color:var(--fg-m);font-size:.85rem}

    /* หน้าประวัติ */
    .history-screen{padding:0 0 90px}
    .page-hdr{display:flex;align-items:center;gap:14px;padding:16px 20px;position:sticky;top:0;
      background:rgba(26,15,46,.92);backdrop-filter:blur(16px);z-index:10}
    .page-back{width:38px;height:38px;background:var(--bg-card);border:1px solid var(--border);
      border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--fg-m);
      font-size:.9rem;cursor:pointer;transition:all .2s;flex-shrink:0}
    .page-back:hover{background:var(--bg-card-h);color:var(--fg)}
    .page-title{font-family:'Nunito',sans-serif;font-size:1.1rem;font-weight:800}
    .filter-tabs{display:flex;gap:8px;padding:0 20px 14px;overflow-x:auto}
    .filter-tabs::-webkit-scrollbar{display:none}
    .ftab{padding:7px 16px;border-radius:999px;font-size:.72rem;font-weight:600;cursor:pointer;
      white-space:nowrap;border:1px solid var(--border);background:transparent;color:var(--fg-m);
      transition:all .2s;font-family:inherit}
    .ftab.active{background:var(--purple-mid);border-color:var(--purple-mid);color:white}
    .ftab:hover:not(.active){border-color:var(--purple-light);color:var(--fg)}

    /* หน้าครอบครัว */
    .family-screen{padding:0 0 90px}
    .fam-member{display:flex;align-items:center;gap:14px;padding:16px 20px;
      border-bottom:1px solid var(--border);transition:background .2s;cursor:pointer}
    .fam-member:hover{background:var(--bg-card)}
    .fam-av{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;
      justify-content:center;font-size:1.1rem;font-weight:800;color:white;font-family:'Nunito',sans-serif;flex-shrink:0}
    .fam-info{flex:1}
    .fam-name{font-size:.9rem;font-weight:600}
    .fam-role{font-size:.68rem;color:var(--fg-m)}
    .fam-bal{text-align:right}
    .fam-bal .amt{font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;color:var(--purple-light)}
    .fam-bal .lbl{font-size:.6rem;color:var(--fg-m)}
    .fam-total{padding:20px;margin:16px 20px;background:var(--bg-card);border:1px solid var(--border);border-radius:18px;text-align:center}
    .fam-total .lbl{font-size:.72rem;color:var(--fg-m);margin-bottom:4px}
    .fam-total .val{font-family:'Nunito',sans-serif;font-size:2rem;font-weight:900;color:var(--yellow)}

    /* หน้าโปรไฟล์ */
    .profile-screen{padding:0 0 90px}
    .pf-center{display:flex;flex-direction:column;align-items:center;padding:2rem 20px}
    .pf-avatar{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;
      justify-content:center;font-size:2rem;font-weight:900;color:white;font-family:'Nunito',sans-serif;
      margin-bottom:12px;box-shadow:0 8px 24px rgba(0,0,0,.3)}
    .pf-name{font-size:1.2rem;font-weight:700;margin-bottom:2px}
    .pf-role{font-size:.8rem;color:var(--fg-m);margin-bottom:4px}
    .pf-id{font-size:.65rem;color:rgba(184,172,224,.5);font-family:monospace}
    .pf-menu{padding:0 20px;display:flex;flex-direction:column;gap:8px;margin-top:1rem}
    .pf-item{display:flex;align-items:center;gap:14px;padding:16px;background:var(--bg-card);
      border:1px solid var(--border);border-radius:16px;cursor:pointer;transition:all .2s}
    .pf-item:hover{background:var(--bg-card-h);transform:translateX(4px)}
    .pf-item i{width:20px;text-align:center;color:var(--purple-light);font-size:.95rem}
    .pf-item span{flex:1;font-size:.88rem;font-weight:500}
    .pf-item .arrow{color:var(--fg-m);font-size:.75rem}
    .pf-item.danger{border-color:rgba(248,113,113,.2)}
    .pf-item.danger i{color:var(--red)}
    .pf-item.danger span{color:var(--red)}

    /* บอทแถบล่าง */
    .bot-nav{position:absolute;bottom:0;left:0;right:0;z-index:50;
      background:rgba(26,15,46,.92);backdrop-filter:blur(24px);border-top:1px solid var(--border);
      display:flex;justify-content:space-around;padding:8px 0 max(8px,env(safe-area-inset-bottom))}
    @media(min-width:500px){.bot-nav{border-radius:0 0 33px 33px}}
    .bn-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 10px;
      cursor:pointer;transition:all .2s;border:none;background:none;color:var(--fg-m);font-family:inherit}
    .bn-item i{font-size:1.1rem;transition:all .2s}
    .bn-item span{font-size:.58rem;font-weight:500}
    .bn-item.active{color:var(--purple-light)}
    .bn-item.active i{transform:scale(1.15);text-shadow:0 0 16px rgba(139,95,207,.35)}
    .bn-item:hover:not(.active){color:var(--fg)}
    .bn-center{margin-top:-22px;width:52px;height:52px;
      background:linear-gradient(135deg,var(--purple-mid),var(--pink));border-radius:50%;
      display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:white;
      box-shadow:0 4px 20px rgba(139,95,207,.4);cursor:pointer;border:none;transition:all .25s}
    .bn-center:hover{transform:scale(1.1) rotate(90deg);box-shadow:0 6px 28px rgba(139,95,207,.6)}

    /* โมดัล PIN */
    .modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(12px);
      z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;
      pointer-events:none;transition:opacity .3s}
    .modal-overlay.open{opacity:1;pointer-events:all}
    .pin-modal{width:280px;text-align:center}
    .pin-title{font-family:'Nunito',sans-serif;font-size:1.1rem;font-weight:800;margin-bottom:6px}
    .pin-sub{font-size:.75rem;color:var(--fg-m);margin-bottom:24px}
    .pin-dots{display:flex;justify-content:center;gap:14px;margin-bottom:28px}
    .pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--purple-light);
      transition:all .15s}
    .pin-dot.filled{background:var(--purple-light);transform:scale(1.15)}
    .pin-dot.error{border-color:var(--red);background:var(--red);animation:shake .4s ease}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
    .pin-numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:240px;margin:0 auto}
    .pin-key{width:64px;height:64px;border-radius:50%;border:1px solid var(--border);
      background:var(--bg-card);color:var(--fg);font-size:1.4rem;font-weight:600;cursor:pointer;
      display:flex;align-items:center;justify-content:center;transition:all .15s;
      font-family:'Nunito',sans-serif;margin:0 auto}
    .pin-key:hover{background:var(--bg-card-h);border-color:var(--purple-mid)}
    .pin-key:active{transform:scale(.92);background:rgba(139,95,207,.2)}
    .pin-key.empty{visibility:hidden}
    .pin-key.del{font-size:1.1rem}

    /* โมดัลส่งเงิน */
    .sheet-overlay{position:absolute;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);
      z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;
      pointer-events:none;transition:opacity .3s}
    .sheet-overlay.open{opacity:1;pointer-events:all}
    .sheet{width:100%;max-width:420px;background:linear-gradient(180deg,#2a1a45,var(--bg));
      border-radius:28px 28px 0 0;padding:16px 24px 40px;transform:translateY(100%);
      transition:transform .4s cubic-bezier(.16,1,.3,1);max-height:85vh;overflow-y:auto}
    .sheet::-webkit-scrollbar{display:none}
    .sheet-overlay.open .sheet{transform:translateY(0)}
    .sheet-handle{width:40px;height:4px;background:rgba(255,255,255,.15);border-radius:999px;margin:0 auto 16px}
    .sheet-title{font-family:'Nunito',sans-serif;font-size:1.15rem;font-weight:800;margin-bottom:16px;text-align:center}

    .tr-member-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
    .tr-member{display:flex;align-items:center;gap:12px;padding:14px;background:var(--bg-card);
      border:2px solid transparent;border-radius:16px;cursor:pointer;transition:all .2s}
    .tr-member:hover{background:var(--bg-card-h)}
    .tr-member.selected{border-color:var(--purple-mid);background:rgba(139,95,207,.1)}
    .tr-m-av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;
      justify-content:center;font-size:.95rem;font-weight:800;color:white;font-family:'Nunito',sans-serif;flex-shrink:0}
    .tr-m-name{font-size:.88rem;font-weight:600}
    .tr-m-bal{font-size:.7rem;color:var(--fg-m)}
    .tr-m-check{margin-left:auto;color:var(--purple-light);font-size:1rem;opacity:0;transition:opacity .2s}
    .tr-member.selected .tr-m-check{opacity:1}

    .s-input{width:100%;padding:14px 16px;background:var(--bg-card);border:1px solid var(--border);
      border-radius:14px;color:var(--fg);font-family:inherit;font-size:.9rem;outline:none;transition:border-color .2s}
    .s-input:focus{border-color:var(--purple-mid);box-shadow:0 0 0 3px rgba(139,95,207,.15)}
    .s-input::placeholder{color:rgba(184,172,224,.4)}
    .s-label{display:block;font-size:.72rem;color:var(--fg-m);margin-bottom:6px;font-weight:500}
    .s-group{margin-bottom:14px}

    .s-btn{width:100%;p
