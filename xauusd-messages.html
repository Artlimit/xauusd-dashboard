<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>XAUUSD Messages</title>
<meta name="theme-color" content="#0A0C0F">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{--gold:#F5A623;--bg:#0A0C0F;--bg2:#111418;--bg3:#181C22;--bg4:#1E2430;--green:#00E096;--red:#FF4D6D;--blue:#4DA6FF;--purple:#A78BFA;--text:#E8EBF0;--muted:#6B7280;--border:rgba(245,166,35,0.15);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Sarabun',sans-serif;height:100vh;display:flex;flex-direction:column;}
.header{padding:12px 16px;border-bottom:1px solid var(--border);background:rgba(10,12,15,.97);backdrop-filter:blur(12px);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.header-title{font-family:'Space Mono',monospace;font-size:11px;color:var(--gold);letter-spacing:2px;flex:1;}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);}
.chat-area{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px;}
.msg-bubble{max-width:80%;padding:9px 13px;border-radius:12px;font-size:13px;line-height:1.5;word-break:break-word;}
.msg-from-admin{align-self:flex-start;background:var(--bg3);border:1px solid var(--border);border-radius:4px 12px 12px 12px;}
.msg-from-me{align-self:flex-end;background:rgba(245,166,35,.15);border:1px solid rgba(245,166,35,.25);border-radius:12px 4px 12px 12px;}
.msg-meta{font-size:9px;color:var(--muted);margin-top:3px;font-family:'Space Mono',monospace;}
.msg-sender{font-size:9px;color:var(--gold);margin-bottom:2px;font-weight:700;}
.input-area{padding:10px 16px;border-top:1px solid var(--border);background:rgba(10,12,15,.97);display:flex;gap:8px;flex-shrink:0;}
.input-area input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:9px 14px;color:var(--text);font-size:13px;outline:none;font-family:'Sarabun',sans-serif;}
.send-btn{background:linear-gradient(135deg,var(--gold),#E8941A);border:none;border-radius:50%;width:38px;height:38px;cursor:pointer;color:#000;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.login-wrap{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px;z-index:100;}
.login-box{background:var(--bg3);border:1px solid var(--border);border-radius:16px;padding:28px 24px;width:100%;max-width:340px;}
.login-box.hide{display:none;}
.login-title{font-family:'Space Mono',monospace;font-size:12px;color:var(--gold);letter-spacing:2px;text-align:center;margin-bottom:4px;}
.login-sub{font-size:11px;color:var(--muted);text-align:center;margin-bottom:20px;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:10px;color:var(--muted);margin-bottom:4px;}
.field input,.field select{width:100%;background:var(--bg4);border:1px solid var(--border);border-radius:8px;padding:9px 11px;color:var(--text);font-size:13px;outline:none;font-family:'Sarabun',sans-serif;}
.btn-gold{width:100%;padding:12px;background:linear-gradient(135deg,var(--gold),#E8941A);border:none;border-radius:10px;color:#000;font-size:14px;font-weight:700;cursor:pointer;font-family:'Sarabun',sans-serif;}
.err{font-size:11px;color:var(--red);text-align:center;margin-top:8px;min-height:14px;}
.empty-state{text-align:center;color:var(--muted);font-size:12px;padding:40px 20px;}
.notif-bar{background:rgba(0,224,150,.1);border-bottom:1px solid rgba(0,224,150,.2);padding:8px 16px;font-size:11px;color:var(--green);display:none;}
.notif-bar.show{display:block;}
.thread-list{flex:1;overflow-y:auto;}
.thread-item{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;gap:10px;align-items:center;}
.thread-item:hover{background:var(--bg3);}
.thread-item.unread{background:rgba(245,166,35,.03);}
.thread-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#E8941A);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#000;flex-shrink:0;}
.thread-body{flex:1;min-width:0;}
.thread-name{font-size:13px;font-weight:600;}
.thread-preview{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.thread-time{font-size:9px;color:var(--muted);font-family:'Space Mono',monospace;}
.unread-badge{background:var(--gold);color:#000;border-radius:50%;width:16px;height:16px;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.back-btn{background:none;border:none;color:var(--gold);font-size:18px;cursor:pointer;padding:0 4px;}
.tab-bar{display:flex;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;}
.tab{flex:1;padding:10px;text-align:center;font-size:11px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-title">💬 XAUUSD MESSAGES</div>
    <div class="login-sub">ระบบส่งข้อความ Real-time</div>
    <div class="field"><label>เข้าสู่ระบบในฐานะ</label>
      <select id="loginRole">
        <option value="member">สมาชิก</option>
        <option value="admin">แอดมิน</option>
      </select>
    </div>
    <div class="field"><label>ชื่อ / Account</label>
      <input type="text" id="loginName" placeholder="เช่น สมชาย หรือ Admin">
    </div>
    <div class="field" id="adminPassField" style="display:none"><label>Admin Password</label>
      <input type="password" id="adminPass" placeholder="••••••••">
    </div>
    <button class="btn-gold" onclick="doLogin()">เข้าสู่ระบบ</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainApp" style="display:none;flex-direction:column;height:100vh;flex:1">

  <!-- ADMIN VIEW: Thread List -->
  <div id="adminView" style="display:none;flex-direction:column;height:100vh">
    <div class="header">
      <div class="status-dot"></div>
      <span class="header-title">💬 ADMIN MESSAGES</span>
      <span style="font-size:10px;color:var(--muted)" id="adminUnreadCount"></span>
      <button onclick="doLogout()" style="background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;color:var(--muted);font-size:10px;cursor:pointer">ออก</button>
    </div>
    <div class="notif-bar" id="adminNotifBar"></div>
    <div class="thread-list" id="threadList">
      <div class="empty-state">ยังไม่มีข้อความ</div>
    </div>
  </div>

  <!-- ADMIN CHAT with Member -->
  <div id="adminChatView" style="display:none;flex-direction:column;height:100vh">
    <div class="header">
      <button class="back-btn" onclick="backToThreads()">←</button>
      <div class="status-dot" id="memberStatusDot"></div>
      <span class="header-title" id="adminChatTitle">สนทนา</span>
    </div>
    <div class="chat-area" id="adminChatArea"></div>
    <div class="input-area">
      <input type="text" id="adminMsgInput" placeholder="พิมพ์ข้อความ..." onkeydown="if(event.key==='Enter')adminSend()">
      <button class="send-btn" onclick="adminSend()">▶</button>
    </div>
  </div>

  <!-- MEMBER VIEW -->
  <div id="memberView" style="display:none;flex-direction:column;height:100vh">
    <div class="header">
      <div class="status-dot"></div>
      <span class="header-title">💬 ติดต่อแอดมิน</span>
      <span style="font-size:10px;color:var(--muted)" id="memberNameDisplay"></span>
      <button onclick="doLogout()" style="background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;color:var(--muted);font-size:10px;cursor:pointer">ออก</button>
    </div>
    <div class="notif-bar" id="memberNotifBar"></div>
    <div class="chat-area" id="memberChatArea"></div>
    <div class="input-area">
      <input type="text" id="memberMsgInput" placeholder="พิมพ์ข้อความถึงแอดมิน..." onkeydown="if(event.key==='Enter')memberSend()">
      <button class="send-btn" onclick="memberSend()">▶</button>
    </div>
  </div>

</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, push, onValue, set, serverTimestamp, onChildAdded, get } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  databaseURL: "https://xauusd-pro-20635-default-rtdb.firebaseio.com"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const ADMIN_PASS = localStorage.getItem('xauusd_admin_pass') || 'admin2026';

let currentUser = null;
let currentRole = null;
let currentThread = null;
let unsubscribes = [];

// ===== LOGIN =====
document.getElementById('loginRole').addEventListener('change', function(){
  document.getElementById('adminPassField').style.display = this.value==='admin' ? 'block' : 'none';
});

window.doLogin = function(){
  const role = document.getElementById('loginRole').value;
  const name = document.getElementById('loginName').value.trim();
  const pass = document.getElementById('adminPass').value;
  const err = document.getElementById('loginErr');

  if(!name){ err.textContent='⚠️ กรุณาใส่ชื่อ'; return; }
  if(role==='admin' && pass !== ADMIN_PASS){ err.textContent='❌ รหัสผ่านไม่ถูกต้อง'; return; }

  currentUser = name;
  currentRole = role;
  localStorage.setItem('xauusd_msg_user', name);
  localStorage.setItem('xauusd_msg_role', role);

  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('mainApp').style.display = 'flex';

  if(role === 'admin') showAdminView();
  else showMemberView();
};

window.doLogout = function(){
  localStorage.removeItem('xauusd_msg_user');
  localStorage.removeItem('xauusd_msg_role');
  unsubscribes.forEach(u => u && u());
  location.reload();
};

// ===== ADMIN VIEW =====
function showAdminView(){
  document.getElementById('adminView').style.display = 'flex';
  loadThreads();
}

function loadThreads(){
  const threadsRef = ref(db, 'threads');
  onValue(threadsRef, snap => {
    const data = snap.val() || {};
    const threads = Object.entries(data).map(([id, t]) => ({id, ...t}))
      .sort((a,b) => (b.lastTime||0) - (a.lastTime||0));

    const unread = threads.filter(t => t.unreadAdmin > 0).length;
    document.getElementById('adminUnreadCount').textContent = unread ? unread+' ยังไม่อ่าน' : '';

    if(!threads.length){
      document.getElementById('threadList').innerHTML = '<div class="empty-state">📭 ยังไม่มีข้อความจากสมาชิก</div>';
      return;
    }

    document.getElementById('threadList').innerHTML = threads.map(t => `
      <div class="thread-item ${t.unreadAdmin>0?'unread':''}" onclick="openThread('${t.id}','${t.memberName}')">
        <div class="thread-avatar">${t.memberName?.charAt(0)||'?'}</div>
        <div class="thread-body">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span class="thread-name">${t.memberName||t.id}</span>
            <span class="thread-time">${t.lastTimeStr||''}</span>
          </div>
          <div class="thread-preview">${t.lastMsg||'...'}</div>
        </div>
        ${t.unreadAdmin>0?`<div class="unread-badge">${t.unreadAdmin}</div>`:''}
      </div>`).join('');

    // แจ้งเตือนข้อความใหม่
    if(unread > 0){
      const bar = document.getElementById('adminNotifBar');
      bar.textContent = `🔔 มีข้อความใหม่ ${unread} การสนทนา`;
      bar.classList.add('show');
      setTimeout(() => bar.classList.remove('show'), 4000);
    }
  });
}

window.openThread = function(threadId, memberName){
  currentThread = threadId;
  document.getElementById('adminView').style.display = 'none';
  document.getElementById('adminChatView').style.display = 'flex';
  document.getElementById('adminChatTitle').textContent = '💬 '+memberName;

  // Mark as read
  set(ref(db, `threads/${threadId}/unreadAdmin`), 0);

  loadMessages('adminChatArea', threadId, 'admin');
};

window.backToThreads = function(){
  document.getElementById('adminChatView').style.display = 'none';
  document.getElementById('adminView').style.display = 'flex';
  currentThread = null;
};

window.adminSend = function(){
  const input = document.getElementById('adminMsgInput');
  const text = input.value.trim();
  if(!text || !currentThread) return;
  input.value = '';

  const now = new Date();
  const timeStr = now.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});

  push(ref(db, `threads/${currentThread}/messages`), {
    text, from: 'admin', sender: 'Admin', time: timeStr, ts: Date.now()
  });

  set(ref(db, `threads/${currentThread}`), {
    memberName: currentThread,
    lastMsg: '📨 Admin: '+text,
    lastTime: Date.now(),
    lastTimeStr: timeStr,
    unreadMember: 1,
    unreadAdmin: 0
  });
};

// ===== MEMBER VIEW =====
function showMemberView(){
  document.getElementById('memberView').style.display = 'flex';
  document.getElementById('memberNameDisplay').textContent = currentUser;

  const threadId = currentUser.replace(/[^a-zA-Z0-9ก-๙]/g,'_');
  currentThread = threadId;

  // Mark member messages as read
  set(ref(db, `threads/${threadId}/unreadMember`), 0);

  loadMessages('memberChatArea', threadId, 'member');

  // Listen for new admin messages
  onValue(ref(db, `threads/${threadId}/unreadMember`), snap => {
    if(snap.val() > 0){
      const bar = document.getElementById('memberNotifBar');
      bar.textContent = '🔔 มีข้อความจากแอดมิน';
      bar.classList.add('show');
      setTimeout(() => bar.classList.remove('show'), 3000);
      set(ref(db, `threads/${threadId}/unreadMember`), 0);
    }
  });
}

window.memberSend = function(){
  const input = document.getElementById('memberMsgInput');
  const text = input.value.trim();
  if(!text) return;
  input.value = '';

  const now = new Date();
  const timeStr = now.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
  const threadId = currentThread;

  push(ref(db, `threads/${threadId}/messages`), {
    text, from: 'member', sender: currentUser, time: timeStr, ts: Date.now()
  });

  set(ref(db, `threads/${threadId}`), {
    memberName: currentUser,
    lastMsg: currentUser+': '+text,
    lastTime: Date.now(),
    lastTimeStr: timeStr,
    unreadAdmin: 1,
    unreadMember: 0
  });
};

// ===== SHARED: Load Messages =====
function loadMessages(areaId, threadId, viewAs){
  const area = document.getElementById(areaId);
  area.innerHTML = '';

  onChildAdded(ref(db, `threads/${threadId}/messages`), snap => {
    const msg = snap.val();
    const isMe = (viewAs==='admin' && msg.from==='admin') || (viewAs==='member' && msg.from==='member');

    const div = document.createElement('div');
    div.className = 'msg-bubble ' + (isMe ? 'msg-from-me' : 'msg-from-admin');
    div.innerHTML = `
      ${!isMe ? `<div class="msg-sender">${msg.sender||'?'}</div>` : ''}
      <div>${msg.text}</div>
      <div class="msg-meta">${msg.time||''}</div>`;
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
  });
}

// ===== AUTO LOGIN =====
const savedUser = localStorage.getItem('xauusd_msg_user');
const savedRole = localStorage.getItem('xauusd_msg_role');
if(savedUser && savedRole){
  currentUser = savedUser;
  currentRole = savedRole;
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('mainApp').style.display = 'flex';
  if(savedRole==='admin') showAdminView();
  else showMemberView();
}
</script>
</body>
</html>
